version: '3.8'

services:
  # 前端（React SPA + Nginx）
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  # 后端 API（NestJS）
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Docker 容器内覆盖 HOST，通过宿主机转发访问本地/远程数据库
      - DATABASE_HOST=host.docker.internal
      - REDIS_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes: {}
