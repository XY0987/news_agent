version: '3.8'

services:
  # 前端（React SPA + Nginx）
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
    restart: unless-stopped

  # 后端 API（NestJS）
  api:
    build: ./backend
    network_mode: host
    env_file:
      - ./backend/.env
    restart: unless-stopped

volumes: {}
