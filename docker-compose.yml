version: '3.8'

services:
  # 前端（React SPA + Nginx）
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

  # 后端 API（NestJS）
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

# 使用外部网络，让 api 容器能直接通过容器名访问已有的 mysql/redis 容器
networks:
  default:
    name: news_agent_net
    driver: bridge
